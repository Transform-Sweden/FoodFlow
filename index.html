<!DOCTYPE html>
<html lang="sv">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍃 FoodFlow</title>


<style>


:root {

--bg:#f4f6f4;
--card:white;
--text:#222;
--primary:#4caf50;
--shadow:0 8px 20px rgba(0,0,0,0.08);

}



body.dark {

--bg:#121212;
--card:#1e1e1e;
--text:#eeeeee;
--shadow:0 8px 20px rgba(0,0,0,0.5);

}



* {

box-sizing:border-box;

}



body {

margin:0;

font-family:
"Segoe UI",
Arial,
sans-serif;

background:var(--bg);

color:var(--text);

transition:.3s;

}



header {

text-align:center;

padding:30px;

}



h1 {

font-size:40px;

margin-bottom:5px;

}



button {

border:none;

background:var(--primary);

color:white;

padding:10px 15px;

border-radius:14px;

cursor:pointer;

font-size:15px;

}



.container {

max-width:1200px;

margin:auto;

padding:20px;

}



/* WEEK */


.week {

display:grid;

grid-template-columns:
repeat(7,1fr);

gap:15px;

}



.day {

background:var(--card);

border-radius:20px;

padding:18px;

box-shadow:var(--shadow);

min-height:250px;

}



.day h2 {

text-align:center;

margin-top:0;

}



/* MEALS */


.meal {

background:
rgba(120,120,120,.12);

border-radius:15px;

padding:12px;

margin-top:10px;

}



.meal-title {

font-weight:bold;

}



.small {

font-size:14px;

opacity:.8;

}



.edit {

background:#2196f3;

margin-top:8px;

}



.delete {

background:#e53935;

margin-top:8px;

}



/* MODAL */


.modal {

display:none;

position:fixed;

inset:0;

background:
rgba(0,0,0,.5);

align-items:center;

justify-content:center;

}



.modal-box {

background:var(--card);

padding:25px;

border-radius:20px;

width:90%;

max-width:400px;

}



input,select {

width:100%;

padding:12px;

margin:8px 0;

border-radius:12px;

border:1px solid #ccc;

font-size:16px;

}



/* MOBILE */


@media(max-width:900px){


.week {

grid-template-columns:1fr;

}


}



</style>


</head>


<body>


<header>


<h1>🍃 FoodFlow</h1>

<p>Planera veckans måltider</p>


<button onclick="toggleTheme()">

🌙 / ☀️ Tema

</button>


</header>



<div class="container">


<div class="week" id="week"></div>


</div>





<!-- ADD MEAL WINDOW -->


<div class="modal" id="modal">


<div class="modal-box">


<h2 id="modalTitle">

Lägg till måltid

</h2>



<label>

Typ

</label>


<select id="mealType">


<option>🍳 Frukost</option>

<option>🥗 Lunch</option>

<option>🍝 Middag</option>

<option>☕ Fika</option>


</select>



<label>

Måltid

</label>


<input
id="mealName"
placeholder="T.ex. Spaghetti Bolognese"
>



<label>

Personer

</label>


<input
id="people"
type="number"
value="4"
>



<br>


<button onclick="saveMeal()">

Spara

</button>


<button onclick="closeModal()">

Avbryt

</button>


</div>


</div>





<script>


/*

JavaScript kommer i DEL 2

*/


</script>


</body>

</html>
