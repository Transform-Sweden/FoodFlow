<!DOCTYPE html>
<html lang="sv">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍃 FoodFlow</title>


<style>


:root {

--bg:#f4f6f4;
--card:white;
--text:#222;
--primary:#4caf50;
--shadow:0 8px 20px rgba(0,0,0,0.08);

}



body.dark {

--bg:#121212;
--card:#1e1e1e;
--text:#eeeeee;
--shadow:0 8px 20px rgba(0,0,0,0.5);

}



* {

box-sizing:border-box;

}



body {

margin:0;

font-family:
"Segoe UI",
Arial,
sans-serif;

background:var(--bg);

color:var(--text);

transition:.3s;

}



header {

text-align:center;

padding:30px;

}



h1 {

font-size:40px;

margin-bottom:5px;

}



button {

border:none;

background:var(--primary);

color:white;

padding:10px 15px;

border-radius:14px;

cursor:pointer;

font-size:15px;

margin:4px;

}

background:var(--primary);

color:white;

padding:10px 15px;

border-radius:14px;

cursor:pointer;

font-size:15px;

}



.container {

max-width:1200px;

margin:auto;

padding:20px;

}



/* WEEK */


.week {

display:grid;

grid-template-columns:
repeat(7,1fr);

gap:15px;

}



.day {

background:var(--card);

border-radius:20px;

padding:18px;

box-shadow:var(--shadow);

min-height:250px;

}



.day h2 {

text-align:center;

margin-top:0;

}



/* MEALS */


.meal {

background:
rgba(120,120,120,.12);

border-radius:15px;

padding:12px;

margin-top:10px;

}



.meal-title {

font-weight:bold;

}



.small {

font-size:14px;

opacity:.8;

}



.edit {

background:#2196f3;

margin-top:8px;

}



.delete {

background:#e53935;

margin-top:8px;

}



/* MODAL */


.modal {

display:none;

position:fixed;

inset:0;

background:
rgba(0,0,0,.5);

align-items:center;

justify-content:center;

}



.modal-box {

background:var(--card);

padding:25px;

border-radius:20px;

width:90%;

max-width:400px;

}



input,select {

width:100%;

padding:12px;

margin:8px 0;

border-radius:12px;

border:1px solid #ccc;

font-size:16px;

}



/* MOBILE */


@media(max-width:900px){


.week {

grid-template-columns:1fr;

}


}



</style>


</head>


<body>


<header>


<h1>🍃 FoodFlow</h1>

<p>Planera veckans måltider</p>


<button onclick="toggleTheme()">

🌙 / ☀️ Tema

</button>


<button onclick="openSettings()">

⚙️ Settings

</button>


</header>



<div class="container">


<div class="week" id="week"></div>


</div>



<!-- SETTINGS WINDOW -->


<div class="modal" id="settingsModal">


<div class="modal-box">


<h2 id="settingsTitle">

⚙️ Settings

</h2>



<h3>
🌍 Language
</h3>


<button onclick="changeLanguage('sv')">

🇸🇪 Svenska

</button>


<button onclick="changeLanguage('en')">

🇬🇧 English

</button>





<h3>
🎨 Theme
</h3>


<button onclick="setTheme('light')">

☀️ Light

</button>


<button onclick="setTheme('dark')">

🌙 Dark

</button>





<h3>
📂 Categories
</h3>


<button onclick="openCategoryManager()">

Manage categories

</button>



<br><br>


<button onclick="closeSettings()">

Close

</button>



</div>


</div>

    <!-- CATEGORY WINDOW -->


<div class="modal" id="categoryModal">


<div class="modal-box">


<h2>

📂 Categories

</h2>



<p>
Add your own meal categories
</p>



<input 
id="categoryName"
placeholder="Category name"
>



<input 
id="categoryEmoji"
placeholder="Emoji e.g. 🍕"
>




<button onclick="saveCategory()">

Save

</button>



<button onclick="closeCategoryManager()">

Close

</button>


</div>


</div>

<!-- ADD MEAL WINDOW -->


<div class="modal" id="modal">


<div class="modal-box">


<h2 id="modalTitle">

Lägg till måltid

</h2>



<label>

Typ

</label>


<select id="mealType">


<option>🍳 Frukost</option>

<option>🥗 Lunch</option>

<option>🍝 Middag</option>

<option>☕ Fika</option>


</select>



<label>

Måltid

</label>


<input
id="mealName"
placeholder="T.ex. Spaghetti Bolognese"
>



<label>

Personer

</label>


<input
id="people"
type="number"
value="4"
>



<br>


<button onclick="saveMeal()">

Spara

</button>


<button onclick="closeModal()">

Avbryt

</button>


</div>


</div>





<script>


const days = [
    "Måndag",
    "Tisdag",
    "Onsdag",
    "Torsdag",
    "Fredag",
    "Lördag",
    "Söndag"
];


let meals = JSON.parse(
    localStorage.getItem("foodflowMeals")
) || {};


let selectedDay = null;
let selectedMeal = null;



// Load old FoodFlow v0.1 data
function migrateOldData(){

    let old = localStorage.getItem("foodflowMeals");

    if(!old) return;


    let data = JSON.parse(old);


    days.forEach(day=>{

        if(
            data[day] &&
            !Array.isArray(data[day])
        ){

            data[day] = [
                {
                    type:"🍝 Middag",
                    name:data[day].name,
                    people:data[day].people
                }
            ];

        }

    });


    localStorage.setItem(
        "foodflowMeals",
        JSON.stringify(data)
    );


}



migrateOldData();



meals =
JSON.parse(
localStorage.getItem("foodflowMeals")
)
|| {};





function render(){


const week =
document.getElementById("week");


week.innerHTML="";



days.forEach(day=>{


let card =
document.createElement("div");


card.className="day";



card.innerHTML = `

<h2>${day}</h2>

<button onclick="openModal('${day}')">
➕ Lägg till
</button>

`;



if(meals[day]){


meals[day].forEach((meal,index)=>{


let box =
document.createElement("div");


box.className="meal";


box.innerHTML = `

<div class="meal-title">

${meal.type}

</div>


<strong>
${meal.name}
</strong>


<div class="small">

👥 ${meal.people} personer

</div>


<button class="edit"
onclick="editMeal('${day}',${index})">

✏️ Ändra

</button>


<button class="delete"
onclick="deleteMeal('${day}',${index})">

🗑 Ta bort

</button>

`;



card.appendChild(box);


});


}



week.appendChild(card);


});


}






function openModal(day){


selectedDay = day;

selectedMeal = null;


document.getElementById("modalTitle")
.innerText =
"Lägg till måltid";


document.getElementById("mealName")
.value="";


document.getElementById("people")
.value=4;


document.getElementById("modal")
.style.display="flex";


}






function editMeal(day,index){


selectedDay=day;

selectedMeal=index;


let meal =
meals[day][index];



document.getElementById("modalTitle")
.innerText =
"Ändra måltid";


document.getElementById("mealType")
.value =
meal.type;



document.getElementById("mealName")
.value =
meal.name;



document.getElementById("people")
.value =
meal.people;



document.getElementById("modal")
.style.display="flex";


}







function closeModal(){


document.getElementById("modal")
.style.display="none";


}







function saveMeal(){


let meal = {


type:
document.getElementById("mealType").value,


name:
document.getElementById("mealName").value,


people:
document.getElementById("people").value


};



if(!meal.name){

alert("Skriv ett namn på måltiden");

return;

}




if(!meals[selectedDay]){

meals[selectedDay]=[];

}




if(selectedMeal === null){


meals[selectedDay].push(meal);


}else{


meals[selectedDay][selectedMeal]=meal;


}



saveData();


closeModal();


render();


}







function deleteMeal(day,index){


meals[day].splice(index,1);


saveData();


render();


}







function saveData(){


localStorage.setItem(

"foodflowMeals",

JSON.stringify(meals)

);


}








function toggleTheme(){


document.body.classList.toggle("dark");



localStorage.setItem(

"foodflowTheme",

document.body.classList.contains("dark")

);


}





if(
localStorage.getItem("foodflowTheme")
==="true"
){

document.body.classList.add("dark");

}





render();


</script>


</body>

</html>
